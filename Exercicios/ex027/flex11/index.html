<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flexbox</title>
        <style>
            div.conteiner {
                display: flex;
                background-color: cadetblue;
                flex-flow: row nowrap;
            }

            div.item {
                text-align: center;
                border: 1px solid black;
                background-color: aquamarine;
                flex-basis: 200px;
            }

            #cxA {
               flex-grow: 1;
               flex-shrink: 1;                 
            }

            #cxB {
               flex-grow: 1;
               flex-shrink: 2;         
            }

            #cxC {
               flex-grow: 1;
               flex-shrink: 0;         
            }
        </style>
</head>
<body>
    <div class="conteiner"> 
    <div class="item" id="cxA">A</div>
    <div class="item" id="cxB">B</div>
    <div class="item" id="cxC">C</div>
</body>
</html>
