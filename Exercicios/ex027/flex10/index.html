<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flexbox</title>
        <style>
            div.conteiner {
                display: flex;
                background-color: cadetblue;
                flex-flow: row wrap;
            }

            div.item {
                text-align: center;
                border: 1px solid black;
                background-color: aquamarine;
                flex-basis: 200px;
                flex-shrink: 1;
                flex-grow: 0;
            }
        </style>
</head>
<body>
    <div class="conteiner"> 
    <div class="item">A</div>
    <div class="item">B</div>
    <div class="item">C</div>
</body>
</html>
