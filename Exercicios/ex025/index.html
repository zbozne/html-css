<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Check box</title>
</head>
<body>
    <h1>Formulario</h1>
    <form action="cadastro.php" method="get">

        <fieldset>
            <legend>Idade</legend>
            <p><input type="radio" name="idade" id="i18-"><label for="i18-">-18</label></p>
            <p><input type="radio" name="idade" id="i18+"><label for="i18+">+18</label></p>
        </fieldset>



        <fieldset>
            <legend>Comida favorita</legend>
            <p><input type="checkbox" name="copizza" id="icopizza"><label for="icopizza">Pitisa</label></p>
            <p><input type="checkbox" name="cosushi" id="icosushi" checked> <label for="icosushi">Sushi</label></p>
            <p><input type="checkbox" name="cohamburguer" id="icohamburguer"><label for="icohamburguer">Hamburguer</label></p>
        </fieldset>


        <p><input type="submit" value="Enviar">
            <input type="reset" value="Limpar">
        </p>
        



    </form>
</body>
</html>
